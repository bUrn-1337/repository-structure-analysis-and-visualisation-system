services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - BIND_HOST=0.0.0.0
    volumes:
      # Mount the parent projects folder so we can scan local repos from the container
      - /home/burn/projects:/projects

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
